<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Servo chute top view sweep</title>
  <desc id="desc">Top view showing the servo pivot, starting angle rays, rotating chute, conveyor exit, and four bin funnel catch regions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2933"/>
    </marker>
    <style>
      .label { font: 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .belt { fill: #30363d; }
      .chute { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 4; }
      .funnel { fill: #dcfce7; stroke: #166534; stroke-width: 3; }
      .pivot { fill: #fef3c7; stroke: #92400e; stroke-width: 4; }
      .ray { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 8; }
      .sweep { fill: none; stroke: #9ca3af; stroke-width: 3; stroke-dasharray: 9 8; }
      .arrow { stroke: #1f2933; stroke-width: 3; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>
  <text x="40" y="42" class="label">Top view: servo rotates the chute to one bin funnel</text>
  <text x="40" y="68" class="small">Concept only. Check funnel overlap before locking radius or servo angles.</text>

  <rect x="410" y="70" width="120" height="225" rx="8" class="belt"/>
  <text x="355" y="55" class="small">conveyor belt exit</text>
  <line x1="470" y1="90" x2="470" y2="245" class="arrow"/>

  <circle cx="470" cy="330" r="24" class="pivot"/>
  <circle cx="470" cy="330" r="8" fill="#92400e"/>
  <text x="506" y="336" class="label">servo pivot</text>

  <path d="M 470 330 L 624 456" class="ray"/>
  <path d="M 470 330 L 520 523" class="ray"/>
  <path d="M 470 330 L 376 507" class="ray"/>
  <path d="M 470 330 L 278 398" class="ray"/>
  <path d="M 275 520 A 260 260 0 0 1 680 440" class="sweep"/>

  <g transform="rotate(72 470 330)">
    <rect x="458" y="300" width="210" height="46" rx="7" class="chute"/>
    <line x1="480" y1="323" x2="650" y2="323" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="585" y="315" class="small">current chute position</text>

  <rect x="610" y="420" width="96" height="74" rx="7" class="funnel"/>
  <text x="630" y="512" class="small">pos 1</text>
  <rect x="480" y="500" width="96" height="74" rx="7" class="funnel"/>
  <text x="500" y="592" class="small">pos 2</text>
  <rect x="330" y="485" width="96" height="74" rx="7" class="funnel"/>
  <text x="350" y="577" class="small">pos 3</text>
  <rect x="215" y="365" width="96" height="74" rx="7" class="funnel"/>
  <text x="235" y="457" class="small">pos 4</text>

  <text x="640" y="390" class="small">funnel catch regions</text>
  <text x="205" y="330" class="small">stagger or widen radius if catches overlap</text>
  <line x1="300" y1="338" x2="380" y2="390" class="arrow"/>
</svg>
